<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google AI Master Certification - Verification</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
    projectId: "gen-lang-client-0295457549",
    appId: "1:577150400691:web:aa481df2872ef7c04218c6",
    apiKey: "AIzaSyBROTca5-hVEYf9vfqRTRAzLJaCs_Cy5-k",
    authDomain: "gen-lang-client-0295457549.firebaseapp.com",
    firestoreDatabaseId: "ai-studio-8a4181c3-30d1-49e7-aa87-d01157042be2",
    storageBucket: "gen-lang-client-0295457549.firebasestorage.app",
    messagingSenderId: "577150400691"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        const auth = getAuth(app);

        window.FirebaseApp = { db, auth, GoogleAuthProvider, signInWithPopup };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        function VerificationPage({ certId }) {
            const [certificate, setCertificate] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                async function fetchCertificate() {
                    if (!certId) return;
                    try {
                        const { db } = window.FirebaseApp;
                        const docRef = doc(db, "certificates", certId);
                        const docSnap = await getDoc(docRef);

                        if (docSnap.exists()) {
                            setCertificate(docSnap.data());
                        } else {
                            setError("Certificate not found. Please verify the ID.");
                        }
                    } catch (err) {
                        console.error(err);
                        setError("An error occurred while verifying the certificate.");
                    } finally {
                        setLoading(false);
                    }
                }
                fetchCertificate();
            }, [certId]);

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                        <p className="text-slate-600 font-medium">Verifying Credential...</p>
                    </div>
                );
            }

            if (error || !certificate) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center space-y-6 border border-red-100 fade-in">
                            <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto text-red-500">
                                <Icon name="alert-circle" className="w-10 h-10" />
                            </div>
                            <h1 className="text-2xl font-bold text-slate-900">Verification Failed</h1>
                            <p className="text-slate-500">{error || "Invalid certificate ID."}</p>
                            <a href="?" className="inline-flex items-center gap-2 text-blue-600 font-semibold hover:underline">
                                <Icon name="arrow-left" className="w-4 h-4" /> Back to Home
                            </a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen py-12 px-4 flex flex-col items-center">
                    <div className="max-w-2xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 fade-in">
                        <div className="bg-blue-600 p-8 text-white text-center relative overflow-hidden">
                            <div className="relative z-10 flex flex-col items-center space-y-4">
                                <div className="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/30 shadow-xl">
                                    <Icon name="shield-check" className="w-10 h-10" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold tracking-tight">Credential Verified</h1>
                                    <p className="text-blue-100 text-sm font-medium">Google AI Master & Prompt Engineer Certification</p>
                                </div>
                            </div>
                        </div>

                        <div className="p-8 sm:p-12 space-y-10">
                            <div className="flex justify-center">
                                <span className="px-4 py-2 bg-slate-100 rounded-full text-slate-600 text-xs font-bold uppercase tracking-widest border border-slate-200">
                                    ID: {certificate.id}
                                </span>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-6">
                                    <div className="flex items-start gap-4">
                                        <div className="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><Icon name="user" className="w-5 h-5" /></div>
                                        <div><p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Student Name</p><p className="text-lg font-bold text-slate-900">{certificate.userName}</p></div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><Icon name="mail" className="w-5 h-5" /></div>
                                        <div><p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Email Address</p><p className="text-lg font-bold text-slate-900">{certificate.email || "turiviktor8@gmail.com"}</p></div>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="flex items-start gap-4">
                                        <div className="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><Icon name="calendar" className="w-5 h-5" /></div>
                                        <div><p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Issue Date</p><p className="text-lg font-bold text-slate-900">{certificate.date}</p></div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><Icon name="award" className="w-5 h-5" /></div>
                                        <div>
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Final Score</p>
                                            <div className="flex items-center gap-2"><p className="text-2xl font-black text-blue-600">{certificate.score}%</p><span className="px-2 py-0.5 bg-green-100 text-green-700 text-[10px] font-bold rounded uppercase">Distinction</span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="pt-10 border-t border-slate-100 flex flex-col items-center text-center space-y-4">
                                <div className="flex items-center gap-2 text-green-600 font-bold"><Icon name="check-circle-2" className="w-5 h-5" /><span>Authenticity Confirmed</span></div>
                                <p className="text-slate-400 text-xs leading-relaxed max-w-sm">This digital credential was issued by Google AI Board and is cryptographically linked to the recipient's identity.</p>
                            </div>
                        </div>
                    </div>
                    <div className="mt-8 text-slate-400 text-xs font-medium">© 2026 Google AI Master & Prompt Engineer Certification</div>
                </div>
            );
        }

        function App() {
            const [certId, setCertId] = useState(null);
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) setCertId(id);
            }, []);

            if (certId) return <VerificationPage certId={certId} />;

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center space-y-8 border border-slate-100 fade-in">
                        <div className="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto text-white shadow-lg shadow-blue-200">
                            <Icon name="sparkles" className="w-10 h-10" />
                        </div>
                        <div className="space-y-2">
                            <h1 className="text-3xl font-bold text-slate-900">AI Master Certification</h1>
                            <p className="text-slate-500">Enter your Certificate ID below to verify your achievement.</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); window.location.search = `?id=${e.target.certId.value}`; }} className="space-y-4">
                            <input name="certId" type="text" placeholder="e.g. CERT-7LYX6XLZX" required className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all font-mono uppercase" />
                            <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">Verify Achievement</button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
